<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi | Asset Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="gambar1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        @media (max-width: 768px) {
            main { padding-bottom: 100px !important; }
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
    </div>

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <div class="flex flex-col items-center mb-10 pb-6 border-b border-slate-800">
            <img src="gambar1.png" alt="Logo" class="w-16 h-16 mb-4 rounded-2xl shadow-[0_0_20px_rgba(59,130,246,0.2)]">
            <img src="gambar2.png" alt="Asset Tracker" class="h-5 w-auto">
        </div>
        <nav class="space-y-8">
            <div>
                <p class="text-[10px] font-bold mb-4 px-3 tracking-widest uppercase text-slate-500">Utama</p>
                <ul class="space-y-2">
                    <li><a href="index.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">📊 Dashboard</a></li>
                    <li><a href="transaksi.html" class="block px-3 py-2 rounded-lg bg-slate-800 text-blue-400 border border-slate-700 font-bold italic">💸 Transaksi</a></li>
                    <li><a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💎 Manajemen Aset</a></li>
                </ul>
            </div>
            <div>
                <p class="text-[10px] font-bold mb-4 px-3 tracking-widest uppercase text-slate-500">Laporan</p>
                <ul class="space-y-2">
                    <li><a href="history.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">📜 Riwayat</a></li>
                    <li><a href="bulanan.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">📅 Bulanan</a></li>
                </ul>
            </div>
        </nav>
        <div class="absolute bottom-10 left-6 right-6">
            <button onclick="handleLogout()" class="w-full py-3 bg-red-900/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase italic tracking-widest hover:bg-red-500 hover:text-white transition-all">
                Exit System
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-8 flex flex-col items-center justify-center">
        <div class="md:hidden w-full max-w-md mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tight text-white">System Input</h1>
                <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest italic">Encrypted Data Entry</p>
            </div>
            <img src="gambar1.png" class="w-10 h-10 rounded-xl">
        </div>

        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
            <form id="formTx" class="space-y-4">
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <button type="button" id="btnIn" onclick="setTipe('pemasukan')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Inflow</button>
                    <button type="button" id="btnOut" onclick="setTipe('pengeluaran')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Outflow</button>
                    <button type="button" id="btnInv" onclick="setTipe('investasi')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Asset</button>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest italic">Date</label>
                    <input type="date" id="tanggal" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white transition" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 italic">Category</label>
                    <select id="kategori" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white transition cursor-pointer">
                    </select>
                </div>

                <div id="unitSection" class="hidden grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase ml-1 italic">Unit Count</label>
                        <input type="number" step="any" id="unitCount" placeholder="0.0" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase ml-1 italic">Unit Type</label>
                        <select id="unitType" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none text-white cursor-pointer">
                            <option value="CASH">CASH</option>
                            <option value="LOT">LOT</option>
                            <option value="GRAM">GRAM</option>
                            <option value="UNIT">UNIT</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest italic">Amount (Nominal)</label>
                    <input type="number" id="nominal" placeholder="0" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest italic">Note / Keterangan</label>
                    <input type="text" id="keterangan" placeholder="..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white" required>
                </div>

                <div class="pt-6">
                    <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl text-[10px] font-black shadow-xl shadow-blue-900/30 transition active:scale-95 uppercase tracking-[0.2em] italic">Commit Transaction</button>
                </div>
            </form>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1 group text-slate-500"><div class="p-2 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></div><span class="text-[9px] font-black uppercase italic">Dash</span></a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1 group"><div class="p-2 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-500/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></div><span class="text-[9px] font-black uppercase text-blue-500 italic">Input</span></a></li>
            <li><a href="aset.html" class="flex flex-col items-center gap-1 group text-slate-500"><div class="p-2 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg></div><span class="text-[9px] font-black uppercase italic">Asset</span></a></li>
            <li><a href="history.html" class="flex flex-col items-center gap-1 group text-slate-500"><div class="p-2 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div><span class="text-[9px] font-black uppercase italic">Report</span></a></li>
        </ul>
    </nav>

    <script>
        let tipeAktif = 'pemasukan';
        const kategoriData = {
            pemasukan: ['Gaji', 'WD Profit Trading', 'Bonus', 'Lain-lain'],
            pengeluaran: ['Makan & Minum', 'Modal Trading (Deposit)', 'Operasional', 'Reserved Fund'],
            investasi: ['Beli Aset', 'Jual Aset']
        };

        async function securityCheck() {
            try {
                const user = await window.getCurrentUser();
                if (!user) {
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            } catch (err) { window.location.href = 'login.html'; }
        }

        async function handleLogout() {
            if (confirm("Terminate Session?")) {
                await window.logoutUser();
                window.location.href = 'login.html';
            }
        }

        document.getElementById('tanggal').valueAsDate = new Date();

        function setTipe(tipe) {
            tipeAktif = tipe;
            const bIn = document.getElementById('btnIn');
            const bOut = document.getElementById('btnOut');
            const bInv = document.getElementById('btnInv');
            const unitSect = document.getElementById('unitSection');
            const selectKat = document.getElementById('kategori');

            [bIn, bOut, bInv].forEach(btn => {
                btn.className = "py-3 rounded-2xl border-2 border-slate-800 text-slate-600 font-black text-[9px] uppercase transition-all italic";
            });

            if (tipe === 'pemasukan') {
                bIn.classList.replace('border-slate-800', 'border-blue-500');
                bIn.classList.replace('text-slate-600', 'text-blue-400');
                bIn.classList.add('bg-blue-500/10');
                unitSect.classList.add('hidden');
            } else if (tipe === 'pengeluaran') {
                bOut.classList.replace('border-slate-800', 'border-red-500');
                bOut.classList.replace('text-slate-600', 'text-red-400');
                bOut.classList.add('bg-red-500/10');
                unitSect.classList.add('hidden');
            } else {
                bInv.classList.replace('border-slate-800', 'border-purple-500');
                bInv.classList.replace('text-slate-600', 'text-purple-400');
                bInv.classList.add('bg-purple-500/10');
                unitSect.classList.remove('hidden');
            }

            selectKat.innerHTML = '';
            kategoriData[tipe].forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.text = item;
                selectKat.appendChild(opt);
            });
        }

        document.getElementById('formTx').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "VERIFYING DATA...";

            const rawDate = document.getElementById('tanggal').value; // YYYY-MM-DD
            const user = await window.getCurrentUser();

            const dataTrans = {
                date: rawDate, // Tetap gunakan format standar YYYY-MM-DD biar sinkron sama database
                type: tipeAktif,
                kategori: document.getElementById('kategori').value,
                amount: parseFloat(document.getElementById('nominal').value) || 0,
                note: document.getElementById('keterangan').value, // Disini kita pakai 'note' karena di app.js lo mungkin panggil tx.note
                unitCount: parseFloat(document.getElementById('unitCount').value || 0),
                unitType: document.getElementById('unitType').value || 'CASH',
                user_id: user.id
            };

            // Jika di DB lo namanya 'keterangan', pastikan di app.js atau db.js dipetakan dengan benar
            // Tapi untuk amannya, gue tambah properti keterangan juga
            dataTrans.keterangan = document.getElementById('keterangan').value;

            try {
                const result = await saveTransactionToCloud(dataTrans);
                if (result) {
                    alert("System Updated: Transaction Logged Successfully.");
                    document.getElementById('formTx').reset();
                    document.getElementById('tanggal').valueAsDate = new Date();
                    setTipe('pemasukan');
                }
            } catch (err) {
                alert("Error: Connection Failed.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Commit Transaction";
            }
        });

        window.onload = securityCheck;
        setTipe('pemasukan');
    </script>
</body>
</html>
