<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Financial Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a; /* Warna gelap ala pro app */
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 glass-card rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4">
                <i class="fas fa-shield-alt text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Secure Access</h1>
            <p class="text-slate-400 text-sm mt-2">Masukan kredensial untuk akses dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    placeholder="nama@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="btnLogin"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-lg transform transition-active active:scale-95 duration-200">
                Sign In
            </button>
        </form>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/50 text-red-400 text-sm text-center rounded-lg">
        </div>

        <footer class="mt-8 text-center">
            <p class="text-slate-500 text-xs uppercase tracking-widest">Powered by Supabase Auth</p>
        </footer>
    </div>

    <script type="module">
        import { loginUser } from './db.js';

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Loading state
            btnLogin.innerText = 'Authenticating...';
            btnLogin.disabled = true;
            errorMessage.classList.add('hidden');

            try {
                const data = await loginUser(email, password);
                if (data.user) {
                    // Berhasil login, arahkan ke dashboard
                    window.location.href = 'index.html'; 
                }
            } catch (error) {
                errorMessage.innerText = 'Login Gagal: ' + error.message;
                errorMessage.classList.remove('hidden');
                btnLogin.innerText = 'Sign In';
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
