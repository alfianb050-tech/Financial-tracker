<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Transaksi | Asset Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        @media (max-width: 768px) {
            main { padding-bottom: 100px !important; }
        }
        input, select { background: #0f172a !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <div class="flex flex-col items-center mb-10 pb-6 border-b border-slate-800">
            <img src="gambar1.png" alt="Logo" class="w-16 h-16 mb-4 rounded-2xl shadow-lg border border-slate-700">
            <img src="gambar2.png" alt="Asset Tracker" class="h-5 w-auto">
        </div>
        <nav class="space-y-2">
            <a href="index.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">📊 Dashboard</a>
            <a href="transaksi.html" class="block px-3 py-2 bg-blue-600 text-white rounded-lg transition text-xs italic">💸 Transaksi</a>
            <a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">💎 Manajemen Aset</a>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-8 max-w-2xl mx-auto w-full">
        <header class="mb-8 flex items-center gap-4">
            <div class="md:hidden">
                <img src="gambar1.png" alt="Logo" class="w-12 h-12 rounded-2xl border border-slate-800">
            </div>
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tight">Add Transaction</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] italic">Secure Data Entry System</p>
            </div>
        </header>

        <form id="tx-form" class="space-y-4">
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-xl space-y-4">
                
                <div>
                    <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2 mb-1 block italic">Jenis Transaksi</label>
                    <select id="type" class="w-full p-4 rounded-2xl border border-slate-700 text-sm font-bold focus:border-blue-500 outline-none transition uppercase italic">
                        <option value="pemasukan">📈 Pemasukan</option>
                        <option value="pengeluaran">📉 Pengeluaran</option>
                        <option value="investasi">💎 Investasi</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2 mb-1 block italic">Nominal (IDR)</label>
                    <input type="number" id="amount" placeholder="0" class="w-full p-4 rounded-2xl border border-slate-700 text-sm font-bold focus:border-blue-500 outline-none transition italic" required>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2 mb-1 block italic">Tanggal</label>
                    <input type="date" id="date" class="w-full p-4 rounded-2xl border border-slate-700 text-sm font-bold focus:border-blue-500 outline-none transition italic" required>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2 mb-1 block italic">Keterangan</label>
                    <input type="text" id="note" placeholder="Contoh: Gaji, Jajan, Beli Aset..." class="w-full p-4 rounded-2xl border border-slate-700 text-sm font-bold focus:border-blue-500 outline-none transition italic">
                </div>

                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black uppercase italic tracking-widest transition-all shadow-lg shadow-blue-900/50">
                    Execute Transaction
                </button>
            </div>
        </form>

        <div id="status-msg" class="mt-4 text-center text-[10px] font-bold uppercase italic tracking-widest hidden"></div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1 text-slate-500"><span class="text-[9px] font-black uppercase italic">Dash</span></a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1 text-blue-500"><span class="text-[9px] font-black uppercase italic">Input</span></a></li>
            <li><a href="aset.html" class="flex flex-col items-center gap-1 text-slate-500"><span class="text-[9px] font-black uppercase italic">Asset</span></a></li>
            <li><a href="history.html" class="flex flex-col items-center gap-1 text-slate-500"><span class="text-[9px] font-black uppercase italic">Report</span></a></li>
        </ul>
    </nav>

    <script>
        // Set tanggal hari ini secara otomatis
        document.getElementById('date').valueAsDate = new Date();

        document.getElementById('tx-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('status-msg');
            
            const data = {
                type: document.getElementById('type').value,
                amount: parseFloat(document.getElementById('amount').value),
                date: document.getElementById('date').value,
                note: document.getElementById('note').value // MENGGUNAKAN 'note' SESUAI DB
            };

            try {
                statusEl.innerText = "Processing...";
                statusEl.className = "mt-4 text-center text-[10px] font-bold uppercase italic text-blue-400";
                statusEl.classList.remove('hidden');

                const { error } = await supabase.from('transactions').insert([data]);
                
                if (error) throw error;

                statusEl.innerText = "Transaction Success! ✅";
                statusEl.className = "mt-4 text-center text-[10px] font-bold uppercase italic text-green-400";
                document.getElementById('tx-form').reset();
                document.getElementById('date').valueAsDate = new Date();

            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error: System Failure ❌";
                statusEl.className = "mt-4 text-center text-[10px] font-bold uppercase italic text-red-400";
            }
        });
    </script>
</body>
</html>
