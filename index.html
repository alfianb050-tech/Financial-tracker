<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Wild Mindset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/db.js"></script>
    <style>
        @media (max-width: 768px) { main { padding-bottom: 100px !important; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:flex flex-col text-slate-400 sticky top-0 h-screen">
        <h2 class="text-xl font-bold mb-10 tracking-tighter text-blue-500 uppercase italic">Bayu Alfianto</h2>
        <nav class="space-y-8 flex-1">
            <div>
                <p class="text-[10px] text-slate-500 font-bold mb-4 px-3 tracking-widest uppercase">Utama</p>
                <ul class="space-y-2">
                    <li><a href="index.html" class="block px-3 py-2 rounded-lg bg-slate-800 text-blue-400 border border-slate-700 font-bold">📊 Dashboard</a></li>
                    <li><a href="transaksi.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💸 Transaksi</a></li>
                    <li><a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💎 Manajemen Aset</a></li>
                </ul>
            </div>
        </nav>
        <button onclick="handleLogout()" class="mt-auto px-3 py-2 rounded-lg bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition font-bold text-xs uppercase italic">
            🚀 Secure Logout
        </button>
    </aside>

    <main class="flex-1 p-6 md:p-12">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white italic uppercase">Operational Command</h1>
                <p id="current-date-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Memuat Waktu...</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-bold text-blue-500 border border-blue-500/30 px-3 py-1 rounded-full uppercase italic">Wild Mindset v3.0</span>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-[2rem] shadow-xl">
                <p class="text-blue-100 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Net Worth</p>
                <h3 id="net-worth" class="text-2xl font-black text-white italic">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-lg">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Liquid Cash</p>
                <h3 id="liquid-cash" class="text-2xl font-black text-blue-400">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-lg">
                <p id="label-cashflow" class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Cashflow</p>
                <h3 id="cashflow" class="text-2xl font-black">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-lg">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Emergency Fund</p>
                <h3 id="emergency-fund" class="text-2xl font-black text-orange-500">Rp 0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-slate-800 p-6 md:p-10 rounded-[3rem] border border-slate-700 min-h-[350px] shadow-2xl">
                <p id="chart-title" class="text-slate-400 font-bold italic uppercase tracking-[0.2em] text-[10px] mb-8">Performa Tahunan</p>
                <div class="w-full h-64"><canvas id="dashboardChart"></canvas></div>
            </div>
            <div class="bg-slate-800 p-8 md:p-10 rounded-[3rem] border border-slate-700 shadow-2xl text-center">
                <h3 class="text-[10px] font-bold mb-10 text-slate-500 uppercase tracking-[0.2em] italic">Pengeluaran</h3>
                <div id="allocation-list" class="space-y-8 text-left"></div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1"><span class="text-[9px] font-black uppercase text-blue-500">Dash</span></a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1"><span class="text-[9px] font-black uppercase text-slate-500">Input</span></a></li>
            <li><button onclick="handleLogout()" class="text-[9px] font-black uppercase text-red-500">Exit</button></li>
        </ul>
    </nav>

    <script>
        // Satpam: Cek login saat file dimuat
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await window.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            renderDashboard();
        });

        async function handleLogout() {
            if (confirm("Logout?")) await window.logoutUser();
        }

        async function renderDashboard() {
            const txs = await getTransactions(); 
            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            const currentYear = now.getFullYear();

            document.getElementById('current-date-display').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            let totalIn = 0, totalOut = 0, totalModalAset = 0, emergency = 0, cashflowMonth = 0;
            let categoriesYear = {};
            const monthlyNet = new Array(12).fill(0);

            txs.forEach(tx => {
                const amt = parseInt(tx.amount);
                const [d, m, y] = tx.date.split('/');
                const txMonth = parseInt(m), txYear = parseInt(y);

                if (tx.type === 'pemasukan' || tx.kategori === 'Jual Aset') totalIn += amt;
                else totalOut += amt;

                if (tx.type === 'investasi') {
                    if (tx.kategori === 'Beli Aset') totalModalAset += amt;
                    else totalModalAset -= amt;
                }

                if (tx.kategori.toLowerCase().includes('darurat')) emergency += amt;

                if (txMonth === currentMonth && txYear === currentYear) {
                    cashflowMonth += (tx.type === 'pemasukan') ? amt : -amt;
                }

                if (txYear === currentYear) {
                    monthlyNet[txMonth - 1] += (tx.type === 'pemasukan') ? amt : -amt;
                    if (tx.type !== 'pemasukan') categoriesYear[tx.kategori] = (categoriesYear[tx.kategori] || 0) + amt;
                }
            });

            const liquid = totalIn - totalOut;
            document.getElementById('net-worth').innerText = `Rp ${(liquid + totalModalAset).toLocaleString('id-ID')}`;
            document.getElementById('liquid-cash').innerText = `Rp ${liquid.toLocaleString('id-ID')}`;
            document.getElementById('emergency-fund').innerText = `Rp ${emergency.toLocaleString('id-ID')}`;
            
            const cfElement = document.getElementById('cashflow');
            cfElement.innerText = `Rp ${cashflowMonth.toLocaleString('id-ID')}`;
            cfElement.className = `text-2xl font-black ${cashflowMonth >= 0 ? 'text-green-400' : 'text-red-400'}`;

            // Render Chart & List (Logic sama seperti sebelumnya)
            renderChart(monthlyNet);
        }

        function renderChart(dataPoints) {
            const ctx = document.getElementById('dashboardChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
                    datasets: [{
                        data: dataPoints,
                        borderColor: '#3b82f6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
