<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Transaksi | Asset Tracker</title>
    <link rel="apple-touch-icon" href="gambar1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        @media (max-width: 768px) {
            main { padding-bottom: 100px !important; }
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        /* Animasi Toast */
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 20px); opacity: 1; }
        }
        .toast-animate { animation: slideDown 0.4s ease forwards; }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <div id="custom-toast" class="fixed top-0 left-1/2 -translate-x-1/2 z-[10000] hidden toast-animate">
        <div id="toast-bg" class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-[0_0_30px_rgba(59,130,246,0.3)] border border-blue-400/50 flex items-center gap-3">
            <span id="toast-icon">🛡️</span>
            <span id="toast-text" class="text-[10px] font-black uppercase italic tracking-[0.2em]">System Updated</span>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
    </div>

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <div class="flex flex-col items-center mb-10 pb-6 border-b border-slate-800">
            <img src="gambar1.png" alt="Logo" class="w-16 h-16 mb-4 rounded-2xl shadow-lg border border-slate-700">
            <img src="gambar2.png" alt="Asset Tracker" class="h-5 w-auto">
        </div>
        <nav class="space-y-8">
            <ul class="space-y-2 text-xs font-bold italic">
                <li><a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg> Dashboard</a></li>
                <li><a href="transaksi.html" class="flex items-center gap-3 px-3 py-2 bg-slate-800 text-blue-400 border border-slate-700 rounded-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> Transaksi</a></li>
                <li><a href="aset.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg> Manajemen Aset</a></li>
                <li><a href="history.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Riwayat</a></li>
            </ul>
        </nav>
        <div class="absolute bottom-10 left-6 right-6">
            <button onclick="handleLogout()" class="w-full py-3 bg-red-900/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase italic tracking-widest hover:bg-red-500 hover:text-white transition-all">Exit System</button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 flex flex-col items-center justify-center min-h-screen">
        <header class="md:hidden w-full max-w-md mb-8 flex justify-between items-center bg-slate-800/50 p-5 rounded-[2rem] border border-slate-700 shadow-xl">
            <div class="flex items-center gap-3">
                <img src="gambar1.png" class="w-12 h-12 rounded-2xl border border-slate-700">
                <div>
                    <h1 class="text-sm font-black italic uppercase text-white leading-none">Entry System</h1>
                    <p class="text-[8px] text-blue-500 font-black uppercase tracking-widest mt-1">Status: Active</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="p-3 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl active:scale-90 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </header>

        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <form id="formTx" class="space-y-4 relative z-10">
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <button type="button" id="btnIn" onclick="setTipe('pemasukan')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Inflow</button>
                    <button type="button" id="btnOut" onclick="setTipe('pengeluaran')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Outflow</button>
                    <button type="button" id="btnInv" onclick="setTipe('investasi')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Asset</button>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 italic tracking-widest">Date</label>
                    <input type="date" id="tanggal" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white transition" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 italic tracking-widest">Category</label>
                    <select id="kategori" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white transition cursor-pointer"></select>
                </div>

                <div id="unitSection" class="hidden grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase ml-1 italic text-blue-400">Unit Qty</label>
                        <input type="number" step="any" id="unitCount" placeholder="0.0" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase ml-1 italic">Type</label>
                        <select id="unitType" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm outline-none text-white">
                            <option value="CASH">CASH</option>
                            <option value="LOT">LOT</option>
                            <option value="GRAM">GRAM</option>
                            <option value="UNIT">UNIT</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 italic tracking-widest">Amount (IDR)</label>
                    <input type="number" id="nominal" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white font-bold" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 italic tracking-widest text-blue-400">Note / Keterangan</label>
                    <input type="text" id="keterangan" placeholder="..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white font-bold italic" required>
                </div>

                <div class="pt-4">
                    <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl text-[10px] font-black shadow-xl shadow-blue-900/30 transition active:scale-95 uppercase tracking-[0.2em] italic">Commit Transaction</button>
                </div>
            </form>
            <div class="absolute -right-10 -bottom-10 text-8xl opacity-5 font-black italic uppercase select-none">Input</div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></div><span class="text-[9px] font-black uppercase italic">Dash</span></a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1 text-blue-500"><div class="p-2 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></div><span class="text-[9px] font-black uppercase italic">Input</span></a></li>
            <li><a href="aset.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg></div><span class="text-[9px] font-black uppercase italic text-slate-500">Asset</span></a></li>
            <li><a href="history.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div><span class="text-[9px] font-black uppercase italic">Report</span></a></li>
        </ul>
    </nav>

    <script>
        let tipeAktif = 'pemasukan';
        const kategoriData = {
            pemasukan: ['Gaji', 'WD Profit Trading', 'Bonus', 'Lain-lain'],
            pengeluaran: ['Makan & Minum', 'Modal Trading (Deposit)', 'Operasional', 'Reserved Fund'],
            investasi: ['Beli Aset', 'Jual Aset']
        };

        function showToast(msg, isError = false) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-text').innerText = msg;
            document.getElementById('toast-bg').className = isError ? "bg-red-600 text-white px-8 py-4 rounded-2xl shadow-xl border border-red-400/50 flex items-center gap-3" 
                                   : "bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-xl border border-blue-400/50 flex items-center gap-3";
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        async function securityCheck() {
            try {
                const user = await window.getCurrentUser();
                if (!user) window.location.href = 'login.html';
                else document.getElementById('loading-overlay').style.display = 'none';
            } catch (err) { window.location.href = 'login.html'; }
        }

        async function handleLogout() {
            if (confirm("Terminate Session?")) {
                await window.logoutUser();
                window.location.href = 'login.html';
            }
        }

        document.getElementById('tanggal').valueAsDate = new Date();

        function setTipe(tipe) {
            tipeAktif = tipe;
            const bIn = document.getElementById('btnIn'), bOut = document.getElementById('btnOut'), bInv = document.getElementById('btnInv');
            const unitSect = document.getElementById('unitSection'), selectKat = document.getElementById('kategori');

            [bIn, bOut, bInv].forEach(btn => {
                btn.className = "py-3 rounded-2xl border-2 border-slate-800 text-slate-600 font-black text-[9px] uppercase transition-all italic";
            });

            if (tipe === 'pemasukan') {
                bIn.classList.replace('border-slate-800', 'border-blue-500'); bIn.classList.replace('text-slate-600', 'text-blue-400');
                bIn.classList.add('bg-blue-500/10'); unitSect.classList.add('hidden');
            } else if (tipe === 'pengeluaran') {
                bOut.classList.replace('border-slate-800', 'border-red-500'); bOut.classList.replace('text-slate-600', 'text-red-400');
                bOut.classList.add('bg-red-500/10'); unitSect.classList.add('hidden');
            } else {
                bInv.classList.replace('border-slate-800', 'border-purple-500'); bInv.classList.replace('text-slate-600', 'text-purple-400');
                bInv.classList.add('bg-purple-500/10'); unitSect.classList.remove('hidden');
            }

            selectKat.innerHTML = '';
            kategoriData[tipe].forEach(item => {
                const opt = document.createElement('option');
                opt.value = item; opt.text = item;
                selectKat.appendChild(opt);
            });
        }

        document.getElementById('formTx').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "VERIFYING...";

            try {
                const user = await window.getCurrentUser();
                const dataTrans = {
                    date: document.getElementById('tanggal').value,
                    type: tipeAktif,
                    kategori: document.getElementById('kategori').value,
                    amount: parseFloat(document.getElementById('nominal').value) || 0,
                    note: document.getElementById('keterangan').value,
                    unitCount: parseFloat(document.getElementById('unitCount').value || 0),
                    unitType: document.getElementById('unitType').value || 'CASH',
                    user_id: user.id
                };

                const result = await window.saveTransactionToCloud(dataTrans);
                if (result) {
                    showToast("System Updated Successfully");
                    document.getElementById('formTx').reset();
                    document.getElementById('tanggal').valueAsDate = new Date();
                    setTipe('pemasukan');
                }
            } catch (err) { showToast("Error: Data Link Failed", true); } 
            finally { btn.disabled = false; btn.innerText = "Commit Transaction"; }
        });

        window.onload = securityCheck;
        setTipe('pemasukan');
    </script>
</body>
</html>
