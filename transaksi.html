<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Transaksi | Asset Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="gambar1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        @media (max-width: 768px) {
            main { padding-bottom: 100px !important; }
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        select option { background: #0f172a; }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
    </div>

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <div class="flex flex-col items-center mb-10 pb-6 border-b border-slate-800">
            <img src="gambar1.png" alt="Logo" class="w-16 h-16 mb-4 rounded-2xl shadow-lg border border-slate-700">
            <img src="gambar2.png" alt="Asset Tracker" class="h-5 w-auto">
        </div>
        <nav class="space-y-8">
            <div>
                <p class="text-[10px] font-bold mb-4 px-3 tracking-widest uppercase text-slate-500">Utama</p>
                <ul class="space-y-2">
                    <li><a href="index.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">📊 Dashboard</a></li>
                    <li><a href="transaksi.html" class="block px-3 py-2 rounded-lg bg-slate-800 text-blue-400 border border-slate-700 font-bold italic">💸 Transaksi</a></li>
                    <li><a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">💎 Manajemen Aset</a></li>
                </ul>
            </div>
        </nav>
        <div class="absolute bottom-10 left-6 right-6">
            <button onclick="handleLogout()" class="w-full py-3 bg-red-900/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase italic tracking-widest hover:bg-red-500 hover:text-white transition-all">
                Exit System
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-8 flex flex-col items-center justify-center">
        <header class="md:hidden w-full max-w-md mb-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="gambar1.png" alt="Logo" class="w-12 h-12 rounded-2xl shadow-lg border border-slate-800">
                <div>
                    <h1 class="text-xl font-black italic uppercase tracking-tight text-white leading-none">System Input</h1>
                    <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest italic mt-1">Encrypted Entry</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="p-3 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl active:scale-90 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </header>

        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
            <form id="formTx" class="space-y-4">
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <button type="button" id="btnIn" onclick="setTipe('pemasukan')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Inflow</button>
                    <button type="button" id="btnOut" onclick="setTipe('pengeluaran')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Outflow</button>
                    <button type="button" id="btnInv" onclick="setTipe('investasi')" class="py-3 rounded-2xl border-2 font-black text-[9px] uppercase transition-all italic">Asset</button>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest italic">Date</label>
                    <input type="date" id="tanggal" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white transition" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 italic">Category</label>
                    <select id="kategori" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white transition cursor-pointer"></select>
                </div>

                <div id="unitSection" class="hidden grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase ml-1 italic text-blue-400">Unit Qty</label>
                        <input type="number" step="any" id="unitCount" placeholder="0.0" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase ml-1 italic">Unit Type</label>
                        <select id="unitType" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none text-white cursor-pointer">
                            <option value="CASH">CASH</option>
                            <option value="LOT">LOT</option>
                            <option value="GRAM">GRAM</option>
                            <option value="UNIT">UNIT</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest italic">Amount (Nominal)</label>
                    <input type="number" id="nominal" placeholder="0" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white font-bold" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest italic text-blue-400">Note / Keterangan</label>
                    <input type="text" id="note" placeholder="..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none text-white" required>
                </div>

                <div class="pt-6">
                    <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl text-[10px] font-black shadow-xl shadow-blue-900/30 transition active:scale-95 uppercase tracking-[0.2em] italic">Commit Transaction</button>
                </div>
            </form>
        </div>
    </main>
