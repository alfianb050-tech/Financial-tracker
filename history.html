<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi | Bayu Alfianto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <style>
        @media (max-width: 768px) { main { padding-bottom: 120px !important; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500"></div>
    </div>

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <h2 class="text-xl font-bold mb-10 tracking-tighter text-blue-500 uppercase italic">Bayu Alfianto</h2>
        <nav class="space-y-8">
            <div>
                <p class="text-[10px] font-bold mb-4 px-3 tracking-widest uppercase text-slate-500">Utama</p>
                <ul class="space-y-2">
                    <li><a href="index.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">📊 Dashboard</a></li>
                    <li><a href="transaksi.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💸 Transaksi</a></li>
                    <li><a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💎 Manajemen Aset</a></li>
                    <li><a href="history.html" class="block px-3 py-2 rounded-lg bg-slate-800 text-blue-400 border border-slate-700 font-bold">📜 Riwayat Lengkap</a></li>
                </ul>
            </div>
            <div>
                <button onclick="logoutUser()" class="w-full text-left px-3 py-2 text-red-500 hover:bg-red-500/10 rounded-lg transition uppercase text-[10px] font-bold">🚪 Logout</button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-8 max-w-5xl mx-auto w-full">
        <header class="flex flex-col gap-4 mb-8">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-white uppercase italic">Financial Archive</h1>
                    <p id="display-period" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Memuat...</p>
                </div>
                <button onclick="logoutUser()" class="md:hidden text-red-500 text-[10px] font-bold border border-red-500/30 px-3 py-1 rounded-full uppercase">Exit</button>
            </div>

            <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-800">
                <div class="flex gap-2 w-full md:w-auto">
                    <select id="filter-month" onchange="renderHistory()" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none focus:border-blue-500">
                        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                        <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                        <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                    <select id="filter-year" onchange="renderHistory()" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none focus:border-blue-500"></select>
                </div>

                <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-700 w-full md:w-auto overflow-x-auto">
                    <button onclick="applyTypeFilter('all', this)" class="type-btn flex-1 md:flex-none px-4 py-2 text-[9px] font-black uppercase rounded-lg bg-slate-700 text-white transition-all">ALL</button>
                    <button onclick="applyTypeFilter('pemasukan', this)" class="type-btn flex-1 md:flex-none px-4 py-2 text-[9px] font-black uppercase rounded-lg text-slate-500 transition-all">IN</button>
                    <button onclick="applyTypeFilter('pengeluaran', this)" class="type-btn flex-1 md:flex-none px-4 py-2 text-[9px] font-black uppercase rounded-lg text-slate-500 transition-all">OUT</button>
                    <button onclick="applyTypeFilter('investasi', this)" class="type-btn flex-1 md:flex-none px-4 py-2 text-[9px] font-black uppercase rounded-lg text-slate-500 transition-all">INVEST</button>
                </div>
            </div>
        </header>

        <div class="bg-slate-800 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead class="bg-slate-900 text-slate-500 border-b border-slate-700">
                        <tr>
                            <th class="p-6 text-[10px] font-bold uppercase tracking-widest">Tanggal</th>
                            <th class="p-6 text-[10px] font-bold uppercase tracking-widest">Kategori</th>
                            <th class="p-6 text-[10px] font-bold uppercase tracking-widest">Keterangan</th>
                            <th class="p-6 text-[10px] font-bold uppercase tracking-widest text-right">Nominal</th>
                            <th class="p-6 text-[10px] font-bold uppercase tracking-widest text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-slate-700/50">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1 group text-slate-500">
                <div class="p-2 rounded-xl group-hover:bg-slate-800 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></div>
                <span class="text-[9px] font-black uppercase">Dash</span>
            </a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1 group text-slate-500">
                <div class="p-2 rounded-xl group-hover:bg-slate-800 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></div>
                <span class="text-[9px] font-black uppercase">Input</span>
            </a></li>
            <li><a href="history.html" class="flex flex-col items-center gap-1 group">
                <div class="p-2 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-900/50"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
                <span class="text-[9px] font-black uppercase text-blue-500">Report</span>
            </a></li>
        </ul>
    </nav>

    <script>
        let currentTypeFilter = 'all';

        // 1. SATPAM AUTH
        async function checkAuth() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
            } else {
                generateYearOptions();
                const now = new Date();
                document.getElementById('filter-month').value = String(now.getMonth() + 1).padStart(2, '0');
                await renderHistory();
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function generateYearOptions() {
            const selectYear = document.getElementById('filter-year');
            const currentYear = new Date().getFullYear();
            for (let y = 2024; y <= currentYear + 1; y++) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.text = y;
                if (y === currentYear) opt.selected = true;
                selectYear.appendChild(opt);
            }
        }

        async function renderHistory() {
            const historyBody = document.getElementById('historyBody');
            const targetMonth = document.getElementById('filter-month').value;
            const targetYear = document.getElementById('filter-year').value;
            const displayPeriod = document.getElementById('display-period');
            
            const monthName = document.getElementById('filter-month').options[document.getElementById('filter-month').selectedIndex].text;
            displayPeriod.innerText = `Arsip: ${monthName} ${targetYear}`;

            historyBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-[10px] text-slate-500 uppercase tracking-widest animate-pulse">Menarik data dari Singapura...</td></tr>';

            const transactions = await window.getTransactions(); 
            
            let filtered = transactions.filter(tx => {
                const parts = tx.date.split('/');
                const m = parts[1].padStart(2, '0');
                const y = parts[2];
                return m === targetMonth && y === targetYear;
            });

            if (currentTypeFilter !== 'all') {
                filtered = filtered.filter(tx => tx.type === currentTypeFilter);
            }

            filtered.sort((a, b) => {
                const dateA = new Date(a.date.split('/').reverse().join('-'));
                const dateB = new Date(b.date.split('/').reverse().join('-'));
                return dateB - dateA;
            });

            historyBody.innerHTML = '';

            if (filtered.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-[10px] text-slate-600 italic uppercase tracking-widest font-bold">Gak ada histori di periode ini, Bay.</td></tr>';
                return;
            }

            filtered.forEach((tx) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-900/30 transition-all group";
                const isNegative = tx.type === 'pengeluaran' || (tx.type === 'investasi' && tx.kategori === 'Beli Aset');
                const colorClass = isNegative ? 'text-red-400' : 'text-green-400';

                // Kolom Keterangan memakai field 'note' atau 'keterangan'
                const note = tx.note || tx.keterangan || '-';

                row.innerHTML = `
                    <td class="p-6 text-[10px] font-mono text-slate-500 font-bold">${tx.date}</td>
                    <td class="p-6">
                        <span class="text-[8px] font-black px-2 py-1 rounded-lg border border-slate-700 uppercase tracking-tighter
                        ${tx.type === 'investasi' ? 'text-purple-400 bg-purple-500/10 border-purple-500/20' : 
                          tx.type === 'pemasukan' ? 'text-blue-400 bg-blue-500/10 border-blue-500/20' : 'text-red-400 bg-red-500/10 border-red-500/20'}">
                            ${tx.kategori}
                        </span>
                    </td>
                    <td class="p-6">
                        <p class="text-xs font-bold text-slate-300">${note}</p>
                        <p class="text-[8px] text-slate-600 mt-0.5 uppercase font-bold tracking-widest">${tx.unitCount > 0 ? tx.unitCount + ' ' + tx.unitType : ''}</p>
                    </td>
                    <td class="p-6 text-right font-black ${colorClass} text-xs">
                        ${isNegative ? '-' : '+'} Rp ${parseInt(tx.amount).toLocaleString('id-ID')}
                    </td>
                    <td class="p-6 text-center">
                        <button onclick="hapusData(${tx.id})" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 transition-all text-[9px] font-black uppercase border border-slate-800 px-3 py-1 rounded-lg">Hapus</button>
                    </td>
                `;
                historyBody.appendChild(row);
            });
        }

        function applyTypeFilter(type, btn) {
            currentTypeFilter = type;
            document.querySelectorAll('.type-btn').forEach(b => {
                b.classList.remove('bg-slate-700', 'text-white');
                b.classList.add('text-slate-500');
            });
            btn.classList.add('bg-slate-700', 'text-white');
            renderHistory();
        }

        async function hapusData(id) {
            if (confirm('Hapus selamanya dari Cloud, Bay?')) {
                const success = await window.deleteTransactionFromCloud(id);
                if (success) { renderHistory(); }
            }
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
