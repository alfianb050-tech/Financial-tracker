<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Bayu Alfianto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <style>
        @media (max-width: 768px) { main { padding-bottom: 100px !important; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        #loading-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <div id="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-[10px] uppercase tracking-widest text-slate-500">Authenticating...</p>
        </div>
    </div>

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <h2 class="text-xl font-bold mb-10 tracking-tighter text-blue-500 uppercase italic">Bayu Alfianto</h2>
        <nav class="space-y-8">
            <div>
                <p class="text-[10px] text-slate-500 font-bold mb-4 px-3 tracking-widest uppercase">Utama</p>
                <ul class="space-y-2">
                    <li><a href="index.html" class="block px-3 py-2 rounded-lg bg-slate-800 text-blue-400 border border-slate-700 font-bold">📊 Dashboard</a></li>
                    <li><a href="transaksi.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💸 Transaksi</a></li>
                    <li><a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition">💎 Manajemen Aset</a></li>
                </ul>
            </div>
            <div>
                <p class="text-[10px] text-slate-500 font-bold mb-4 px-3 tracking-widest uppercase">Sistem</p>
                <ul class="space-y-2">
                    <li><button onclick="logoutUser()" class="w-full text-left px-3 py-2 rounded-lg text-red-500 hover:bg-red-500/10 transition font-bold italic">🚪 Exit System</button></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-12">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white italic uppercase">Operational Command</h1>
                <p id="current-date-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Memuat...</p>
            </div>
            <span class="text-[10px] font-bold text-blue-500 border border-blue-500/30 px-3 py-1 rounded-full uppercase italic">Wild Mindset v3.0</span>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-[2rem] shadow-xl">
                <p class="text-blue-100 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Net Worth</p>
                <h3 id="net-worth" class="text-2xl font-black text-white italic">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-lg">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Liquid Cash</p>
                <h3 id="liquid-cash" class="text-2xl font-black text-blue-400">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-lg">
                <p id="label-cashflow" class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Cashflow</p>
                <h3 id="cashflow" class="text-2xl font-black">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-lg">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1 italic">Emergency Fund</p>
                <h3 id="emergency-fund" class="text-2xl font-black text-orange-500">Rp 0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-slate-800 p-6 md:p-10 rounded-[3rem] border border-slate-700 shadow-2xl">
                <p id="chart-title" class="text-slate-400 font-bold italic uppercase tracking-[0.2em] text-[10px] mb-8">Performa Tahunan</p>
                <div class="h-[300px] w-full"><canvas id="dashboardChart"></canvas></div>
            </div>
            <div class="bg-slate-800 p-8 md:p-10 rounded-[3rem] border border-slate-700 shadow-2xl">
                <h3 class="text-[10px] font-bold mb-10 text-slate-500 uppercase tracking-[0.2em] italic text-center">Distribusi Pengeluaran</h3>
                <div id="allocation-list" class="space-y-8"></div>
            </div>
        </div>
    </main>

    <script>
        async function checkAuth() {
            try {
                const user = await getCurrentUser();
                if (!user) { window.location.href = 'login.html'; return; }
                await renderDashboard();
                const loader = document.getElementById('loading-overlay');
                loader.style.transition = 'opacity 0.5s ease';
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            } catch (err) { window.location.href = 'login.html'; }
        }

        async function renderDashboard() {
            const txs = await getTransactions(); 
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;
            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            document.getElementById('current-date-display').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('label-cashflow').innerText = `Cashflow (${monthNames[currentMonth-1]})`;

            let totalIn = 0, totalOut = 0, modalAset = 0, emergency = 0, monthlyCF = 0;
            let categoriesYear = {}; 
            const monthlyNetData = new Array(12).fill(0);

            txs.forEach(tx => {
                const amt = parseInt(tx.amount) || 0;
                let y, m;
                if (tx.date.includes('-')) {
                    const p = tx.date.split('-'); y = parseInt(p[0]); m = parseInt(p[1]);
                } else {
                    const p = tx.date.split('/'); m = parseInt(p[1]); y = parseInt(p[2]);
                }

                if (tx.type === 'pemasukan' || tx.kategori === 'Jual Aset') totalIn += amt;
                else totalOut += amt;

                if (tx.type === 'investasi') modalAset += (tx.kategori === 'Beli Aset' ? amt : -amt);
                if (tx.kategori?.toLowerCase().includes('darurat')) emergency += amt;

                if (y === currentYear) {
                    monthlyNetData[m - 1] += (tx.type === 'pemasukan' ? amt : -amt);
                    if (m === currentMonth) monthlyCF += (tx.type === 'pemasukan' ? amt : -amt);
                    if (tx.type !== 'pemasukan') categoriesYear[tx.kategori] = (categoriesYear[tx.kategori] || 0) + amt;
                }
            });

            document.getElementById('net-worth').innerText = `Rp ${(totalIn - totalOut + modalAset).toLocaleString('id-ID')}`;
            document.getElementById('liquid-cash').innerText = `Rp ${(totalIn - totalOut).toLocaleString('id-ID')}`;
            document.getElementById('emergency-fund').innerText = `Rp ${emergency.toLocaleString('id-ID')}`;
            
            const cf = document.getElementById('cashflow');
            cf.innerText = `${monthlyCF >= 0 ? '+' : ''} Rp ${monthlyCF.toLocaleString('id-ID')}`;
            cf.className = `text-2xl font-black ${monthlyCF >= 0 ? 'text-green-400' : 'text-red-400'}`;

            // Allocation List Render
            const allocationList = document.getElementById('allocation-list');
            allocationList.innerHTML = '';
            const totalSpentYear = Object.values(categoriesYear).reduce((a, b) => a + b, 0);
            Object.entries(categoriesYear).sort((a,b) => b[1]-a[1]).forEach(([name, val]) => {
                const p = totalSpentYear > 0 ? ((val/totalSpentYear)*100).toFixed(0) : 0;
                allocationList.innerHTML += `<div><div class="flex justify-between text-[9px] mb-2 uppercase font-black text-slate-400"><span>${name}</span><span>${p}%</span></div><div class="w-full bg-slate-900 h-1 rounded-full"><div class="bg-blue-500 h-full" style="width: ${p}%"></div></div></div>`;
            });

            renderChart(monthlyNetData);
        }

        function renderChart(dataPoints) {
            const ctx = document.getElementById('dashboardChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
                    datasets: [{
                        data: dataPoints, borderColor: '#3b82f6', borderWidth: 3, pointRadius: 0, backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', font: { size: 9 } } }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } } } }
            });
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
