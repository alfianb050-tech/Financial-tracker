<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="gambar1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        @media (max-width: 768px) {
            main { padding-bottom: 120px !important; }
        }
        select option { background: #0f172a; }
        .tab-active {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <div class="flex flex-col items-center mb-10 pb-6 border-b border-slate-800">
            <img src="gambar1.png" alt="Logo" class="w-16 h-16 mb-4 rounded-2xl shadow-[0_0_20px_rgba(59,130,246,0.2)]">
            <img src="gambar2.png" alt="Asset Tracker" class="h-5 w-auto">
        </div>
        <nav class="space-y-8">
            <div>
                <p class="text-[10px] font-bold mb-4 px-3 tracking-widest uppercase text-slate-500">Utama</p>
                <ul class="space-y-2">
                    <li><a href="index.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">📊 Dashboard</a></li>
                    <li><a href="transaksi.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">💸 Transaksi</a></li>
                    <li><a href="aset.html" class="block px-3 py-2 rounded-lg hover:bg-slate-800 transition text-xs italic">💎 Manajemen Aset</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-8 max-w-5xl mx-auto w-full">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 text-center md:text-left">
            <div class="flex items-center gap-4 mx-auto md:mx-0 text-left">
                <div class="md:hidden">
                    <img src="gambar1.png" alt="Logo" class="w-12 h-12 rounded-2xl shadow-lg border border-slate-800">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-tight text-white uppercase italic leading-none">Annual Report</h1>
                    <p id="display-year" class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-1 italic">Initializing...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 w-full md:w-auto">
                <select id="select-year" class="flex-1 bg-slate-950 border border-slate-800 px-4 py-3 rounded-xl text-[10px] font-black text-white outline-none focus:border-blue-500 transition cursor-pointer italic uppercase">
                </select>
                
                <button onclick="handleLogout()" class="md:hidden p-3 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </header>

        <div id="tabs-container" class="flex gap-2 bg-slate-950 p-1.5 rounded-2xl border border-slate-800 w-full overflow-x-auto mb-8">
            <a href="history.html" class="flex-1 text-center py-2.5 text-[10px] font-black uppercase italic tracking-widest rounded-xl transition-all text-slate-500">History</a>
            <a href="bulanan.html" class="flex-1 text-center py-2.5 text-[10px] font-black uppercase italic tracking-widest rounded-xl transition-all text-slate-500">Monthly</a>
            <a href="tahunan.html" class="flex-1 text-center py-2.5 text-[10px] font-black uppercase italic tracking-widest rounded-xl transition-all tab-active">Yearly</a>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 text-center md:text-left">
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-lg">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest italic">Inflow</p>
                <p id="annual-inflow" class="text-sm md:text-lg font-black text-green-400 italic">Rp 0</p>
            </div>
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-lg">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest italic">Outflow</p>
                <p id="annual-outflow" class="text-sm md:text-lg font-black text-red-400 italic">Rp 0</p>
            </div>
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-lg">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest italic">Invest</p>
                <p id="annual-invest" class="text-sm md:text-lg font-black text-blue-400 italic">Rp 0</p>
            </div>
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-lg">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest italic">Net</p>
                <p id="annual-net" class="text-sm md:text-lg font-black text-white italic">Rp 0</p>
            </div>
        </div>

        <div class="bg-slate-800 p-6 md:p-10 rounded-[2.5rem] border border-slate-700 mb-10 shadow-2xl">
            <div class="h-[300px] md:h-[400px]">
                <canvas id="yearlyChart"></canvas>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"></path></svg></div><span class="text-[9px] font-black uppercase italic">Dash</span></a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6" stroke-width="2"></path></svg></div><span class="text-[9px] font-black uppercase italic">Input</span></a></li>
            <li><a href="aset.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2 rounded-xl"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="2"></path></svg></div><span class="text-[9px] font-black uppercase italic">Asset</span></a></li>
            <li><a href="history.html" class="flex flex-col items-center gap-1 group"><div class="p-2 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-900/50"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2"></path></svg></div><span class="text-[9px] font-black uppercase text-blue-500 italic">Report</span></a></li>
        </ul>
    </nav>

    <script>
    let myChart = null;

    async function securityCheck() {
        try {
            const user = await window.getCurrentUser();
            if (!user) window.location.href = 'login.html';
        } catch (err) { window.location.href = 'login.html'; }
    }

    async function handleLogout() {
        if (confirm("Terminate Session?")) {
            await window.logoutUser();
            window.location.href = 'login.html';
        }
    }

    // FUNGSI YANG LO KASIH
    function generateYearOptions(selectedYear) {
        const selectYear = document.getElementById('select-year');
        if (!selectYear) return;
        let startYear = Math.max(2024, selectedYear - 1);
        let endYear = startYear + 2; 
        selectYear.innerHTML = ''; 
        for (let y = startYear; y <= endYear; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.text = `TAHUN ${y}`;
            if (y === selectedYear) opt.selected = true;
            selectYear.appendChild(opt);
        }
    }

    async function renderYearly() {
        const selectEl = document.getElementById('select-year');
        const targetYear = parseInt(selectEl.value);
        document.getElementById('display-year').innerText = `ANNUAL PERFORMANCE ${targetYear}`;

        try {
            const txs = await window.getTransactions();
            const inflowData = new Array(12).fill(0), outflowData = new Array(12).fill(0);
            const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGU', 'SEP', 'OKT', 'NOV', 'DES'];
            let totalIn = 0, totalOut = 0, totalInv = 0;

            txs.forEach(tx => {
                const separator = tx.date.includes('/') ? '/' : '-';
                const parts = tx.date.split(separator);
                let txYear, txMonth;
                if (parts[0].length === 4) { [txYear, txMonth] = [parseInt(parts[0]), parseInt(parts[1]) - 1]; }
                else { [txYear, txMonth] = [parseInt(parts[2]), parseInt(parts[1]) - 1]; }

                if (txYear !== targetYear) return;
                const amt = parseFloat(tx.amount) || 0;

                if (tx.type === 'pemasukan') { inflowData[txMonth] += amt; totalIn += amt; } 
                else if (tx.type === 'pengeluaran') { outflowData[txMonth] += amt; totalOut += amt; } 
                else if (tx.type === 'investasi') { outflowData[txMonth] += amt; totalInv += amt; totalOut += amt; }
            });

            const toIDR = (n) => `Rp ${n.toLocaleString('id-ID')}`;
            document.getElementById('annual-inflow').innerText = toIDR(totalIn);
            document.getElementById('annual-outflow').innerText = toIDR(totalOut);
            document.getElementById('annual-invest').innerText = toIDR(totalInv);
            document.getElementById('annual-net').innerText = toIDR(totalIn - totalOut);

            const ctx = document.getElementById('yearlyChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: monthNames,
                    datasets: [
                        { label: 'Inflow', data: inflowData, backgroundColor: '#3b82f6', borderRadius: 8 },
                        { label: 'Outflow', data: outflowData, backgroundColor: '#ef4444', borderRadius: 8 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#64748b', font: { size: 10, weight: 'bold' } } } },
                    scales: {
                        y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#64748b', font: { size: 9, weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9, weight: 'bold' } } }
                    }
                }
            });
        } catch (err) { console.error(err); }
    }

    window.onload = async () => {
        await securityCheck();
        const currentYear = new Date().getFullYear();
        generateYearOptions(currentYear); 
        
        const selectYear = document.getElementById('select-year');
        selectYear.addEventListener('change', function() {
            const picked = parseInt(this.value);
            generateYearOptions(picked); // Update dropdown window
            renderYearly(); // Update chart
        });
        
        renderYearly();
    };
    </script>
</body>
</html>
