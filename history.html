<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Asset Tracker</title>
    <link rel="apple-touch-icon" href="gambar1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        @media (max-width: 768px) { main { padding-bottom: 120px !important; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        select option { background: #0f172a; }
        .tab-active { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        
        @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 20px); opacity: 1; } }
        .toast-animate { animation: slideDown 0.4s ease forwards; }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex">

    <div id="custom-toast" class="fixed top-0 left-1/2 -translate-x-1/2 z-[10000] hidden toast-animate">
        <div id="toast-bg" class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-xl border border-blue-400/50 flex items-center gap-3">
            <span id="toast-icon">🛡️</span>
            <span id="toast-text" class="text-[10px] font-black uppercase italic tracking-widest">Success</span>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 z-[10001] bg-slate-950/80 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h3 class="text-xs font-black uppercase italic text-white mb-2">Terminate Record?</h3>
            <p class="text-[10px] text-slate-400 uppercase font-bold mb-8 leading-relaxed">Data akan dihapus permanen dari sistem cloud.</p>
            <div class="flex gap-3">
                <button id="cancel-delete" class="flex-1 py-4 bg-slate-700 rounded-2xl text-[10px] font-black uppercase italic">Cancel</button>
                <button id="confirm-delete" class="flex-1 py-4 bg-red-600 rounded-2xl text-[10px] font-black uppercase italic shadow-lg shadow-red-900/50">Delete</button>
            </div>
        </div>
    </div>

    <aside class="w-64 border-r border-slate-800 p-6 hidden md:block text-slate-400 sticky top-0 h-screen">
        <div class="flex flex-col items-center mb-10 pb-6 border-b border-slate-800">
            <img src="gambar1.png" class="w-16 h-16 mb-4 rounded-2xl shadow-lg border border-slate-700">
            <img src="gambar2.png" alt="Asset Tracker" class="h-5 w-auto">
        </div>
        <nav class="space-y-8">
            <div>
                <p class="text-[10px] font-bold mb-4 px-3 tracking-widest uppercase text-slate-500">Utama</p>
                <ul class="space-y-2 text-xs font-bold italic">
                    <li><a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg> Dashboard</a></li>
                    <li><a href="transaksi.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> Input</a></li>
                    <li><a href="aset.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg> Asset</a></li>
                    <li><a href="history.html" class="flex items-center gap-3 px-3 py-2 bg-slate-800 text-blue-400 border border-slate-700 rounded-lg">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Report</a></li>
                </ul>
            </div>
        </nav>
        <div class="absolute bottom-10 left-6 right-6">
            <button onclick="handleLogout()" class="w-full py-3 bg-red-900/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase italic tracking-widest hover:bg-red-500 transition-all">Terminate System</button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-8 max-w-5xl mx-auto w-full">
        <header class="flex flex-col gap-4 mb-8">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4 text-left">
                    <img src="gambar1.png" class="w-12 h-12 rounded-2xl border border-slate-800 md:hidden">
                    <div>
                        <h1 class="text-xl md:text-2xl font-black text-white uppercase italic leading-none">Financial Archive</h1>
                        <p id="display-period" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1 italic">Initializing...</p>
                    </div>
                </div>
            </div>

            <div id="tabs-container" class="flex gap-2 bg-slate-950 p-1.5 rounded-2xl border border-slate-800">
                <a href="history.html" class="flex-1 text-center py-2.5 text-[10px] font-black uppercase italic rounded-xl tab-active">History</a>
                <a href="bulanan.html" class="flex-1 text-center py-2.5 text-[10px] font-black uppercase italic rounded-xl text-slate-500 hover:bg-slate-900">Monthly</a>
                <a href="tahunan.html" class="flex-1 text-center py-2.5 text-[10px] font-black uppercase italic rounded-xl text-slate-500 hover:bg-slate-900">Yearly</a>
            </div>

            <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-800 shadow-lg">
                <div class="flex gap-2 w-full md:w-auto">
                    <select id="filter-month" onchange="renderHistory()" class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-[10px] font-black uppercase text-white outline-none focus:border-blue-500 italic">
                        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                        <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                        <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                    <select id="select-year" class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-[10px] font-black uppercase text-white outline-none italic"></select>
                </div>
            </div>
        </header>

        <div class="bg-slate-800 rounded-[2.5rem] border border-slate-700 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead class="bg-slate-950 text-slate-500 border-b border-slate-800">
                        <tr>
                            <th class="p-6 text-[9px] font-black uppercase italic">Date</th>
                            <th class="p-6 text-[9px] font-black uppercase italic">Category</th>
                            <th class="p-6 text-[9px] font-black uppercase italic">Note</th>
                            <th class="p-6 text-[9px] font-black uppercase italic text-right">Amount</th>
                            <th class="p-6 text-[9px] font-black uppercase italic text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-slate-800/50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-slate-800 px-6 py-4 z-50">
        <ul class="flex justify-around items-center">
            <li><a href="index.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></div><span class="text-[9px] font-black uppercase italic">Dash</span></a></li>
            <li><a href="transaksi.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></div><span class="text-[9px] font-black uppercase italic">Input</span></a></li>
            <li><a href="aset.html" class="flex flex-col items-center gap-1 text-slate-500"><div class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg></div><span class="text-[9px] font-black uppercase italic">Asset</span></a></li>
            <li><a href="history.html" class="flex flex-col items-center gap-1 text-blue-500"><div class="p-2 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m1 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div><span class="text-[9px] font-black uppercase italic">Report</span></a></li>
        </ul>
    </nav>

    <script>
        let deleteTargetId = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-text').innerText = msg;
            document.getElementById('toast-bg').className = isError ? "bg-red-600 text-white px-8 py-4 rounded-2xl shadow-xl border border-red-400/50 flex items-center gap-3" : "bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-xl border border-blue-400/50 flex items-center gap-3";
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        async function securityCheck() {
            try {
                const user = await window.getCurrentUser();
                if (!user) window.location.href = 'login.html';
            } catch (err) { window.location.href = 'login.html'; }
        }

        async function handleLogout() {
            if (confirm("Terminate Session?")) {
                await window.logoutUser();
                window.location.href = 'login.html';
            }
        }

        function generateYearOptions(selectedYear) {
            const selectYear = document.getElementById('select-year');
            if (!selectYear) return;
            let startYear = Math.max(2024, selectedYear - 1);
            let endYear = startYear + 2; 
            selectYear.innerHTML = ''; 
            for (let y = startYear; y <= endYear; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.text = `TAHUN ${y}`;
                if (y === selectedYear) opt.selected = true;
                selectYear.appendChild(opt);
            }
        }

        async function renderHistory() {
            const historyBody = document.getElementById('historyBody');
            const targetMonth = document.getElementById('filter-month').value;
            const targetYear = document.getElementById('select-year').value;
            
            document.getElementById('display-period').innerText = `Period: ${targetMonth}/${targetYear}`;
            historyBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-[9px] text-slate-500 uppercase tracking-widest animate-pulse italic font-black">Syncing...</td></tr>';

            try {
                const transactions = await window.getTransactions(); 
                let filtered = transactions.filter(tx => {
                    const separator = tx.date.includes('/') ? '/' : '-';
                    const parts = tx.date.split(separator);
                    let txYear, txMonth;
                    if (parts[0].length === 4) { [txYear, txMonth] = [parts[0], parts[1]]; }
                    else { [txYear, txMonth] = [parts[2], parts[1]]; }
                    return txMonth.padStart(2, '0') === targetMonth && txYear.toString() === targetYear.toString();
                });

                historyBody.innerHTML = '';
                if (filtered.length === 0) {
                    historyBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-[10px] text-slate-600 italic uppercase font-black">No Records.</td></tr>';
                    return;
                }

                filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((tx) => {
                    const isNegative = tx.type === 'pengeluaran' || (tx.type === 'investasi' && tx.kategori === 'Beli Aset');
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-900/40 transition-all group border-b border-slate-800/30";
                    row.innerHTML = `
                        <td class="p-6 text-[10px] font-mono text-slate-500 font-bold italic">${tx.date}</td>
                        <td class="p-6">
                            <span class="text-[8px] font-black px-2 py-1 rounded-lg border uppercase italic ${tx.type === 'investasi' ? 'text-purple-400 border-purple-500/20' : tx.type === 'pemasukan' ? 'text-blue-400 border-blue-500/20' : 'text-red-400 border-red-500/20'}">${tx.kategori}</span>
                        </td>
                        <td class="p-6 text-xs font-bold text-slate-300 italic">${tx.note || '-'}</td>
                        <td class="p-6 text-right font-black ${isNegative ? 'text-red-400' : 'text-green-400'} text-xs italic">Rp ${parseFloat(tx.amount).toLocaleString('id-ID')}</td>
                        <td class="p-6 text-center"><button onclick="triggerDelete(${tx.id})" class="opacity-0 group-hover:opacity-100 text-red-500/50 hover:text-red-500 transition-all text-[9px] font-black uppercase italic">Delete</button></td>
                    `;
                    historyBody.appendChild(row);
                });
            } catch (err) { showToast("Sync Error", true); }
        }

        function triggerDelete(id) {
            deleteTargetId = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        document.getElementById('cancel-delete').onclick = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            deleteTargetId = null;
        };

        document.getElementById('confirm-delete').onclick = async () => {
            if (deleteTargetId) {
                const success = await window.deleteTransactionFromCloud(deleteTargetId);
                if (success) {
                    showToast("Log Purged Successfully");
                    renderHistory();
                }
                document.getElementById('confirm-modal').classList.add('hidden');
            }
        };

        window.onload = async () => {
            await securityCheck();
            const now = new Date();
            generateYearOptions(now.getFullYear());
            document.getElementById('filter-month').value = String(now.getMonth() + 1).padStart(2, '0');
            renderHistory();
        };
    </script>
</body>
</html>
